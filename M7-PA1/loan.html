<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loan Calculator</title>
</head>
<body>
    <h2>Loan Calculator</h2>
    <form action="LoanServlet" method="get">
        <label>Loan Amount:</label>
        <input type="text" name="loanAmount" required><br><br>

        <label>Annual Interest Rate (%):</label>
        <input type="text" name="annualInterestRate" required><br><br>

        <label>Number of Years:</label>
        <input type="text" name="numOfYears" required><br><br>

        <input type="submit" value="Compute Loan Payment">
    </form>
</body>
</html>
